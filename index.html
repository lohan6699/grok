<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninjago LEGO Battle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>Ninjago LEGO Battle!</h1>
        
        <div class="dojo-background">
            <div class="ninja-figure green" id="ninjaGreen">
                <div class="head"></div>
                <div class="body">
                    <div class="belt"></div>
                </div>
                <div class="legs"></div>
                <div class="weapon katana"></div>
            </div>

            <div class="ninja-figure red" id="ninjaRed">
                <div class="head"></div>
                <div class="body">
                    <div class="belt"></div>
                </div>
                <div class="legs"></div>
                <div class="weapon nunchaku"></div>
            </div>

            <div class="action-text" id="actionText">Vez do Ninja Verde!</div>
        </div>

        <button onclick="resetGame()">Reiniciar Batalha</button>
    </div>

    <script>
        const green = document.getElementById('ninjaGreen');
        const red = document.getElementById('ninjaRed');
        const text = document.getElementById('actionText');
        let greenTurn = true;

        function attack(attacker, target, name) {
            if ((greenTurn && attacker === green) || (!greenTurn && attacker === red)) {
                attacker.classList.add('attack-anim');
                target.classList.add('hit-anim');
                text.textContent = `O Ninja ${name} atacou!`;
                
                setTimeout(() => {
                    attacker.classList.remove('attack-anim');
                    target.classList.remove('hit-anim');
                    greenTurn = !greenTurn;
                    text.textContent = greenTurn ? "Vez do Ninja Verde!" : "Vez do Ninja Vermelho!";
                }, 600);
            }
        }

        green.addEventListener('click', () => attack(green, red, 'Verde'));
        red.addEventListener('click', () => attack(red, green, 'Vermelho'));

        function resetGame() {
            greenTurn = true;
            text.textContent = "Vez do Ninja Verde!";
        }
    </script>
</body>
</html>
